spring.application.name=portfolio

# Values come from .env.json (loaded at startup) or OS env/system properties.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/portfolio?serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# Keep SQL schema creation controlled by the service class.
spring.sql.init.mode=never
